{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}OSCI Partner Hub{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <nav class="navbar">
    <a href="{% url 'partner-list' %}" class="navbar-brand">OSCI Partner Hub</a>
    <div class="navbar-links">
      <a href="{% url 'partner-list' %}" class="navbar-link">Partners</a>
      {% if user.is_authenticated %}
      <span class="navbar-link" style="color: var(--text-muted);">{{ user.username }}</span>
      <form method="post" action="{% url 'logout' %}" style="display: inline;">
        {% csrf_token %}
        <button type="submit" class="navbar-link" style="background: none; border: none; cursor: pointer; font: inherit;">Logout</button>
      </form>
      {% else %}
      <a href="{% url 'login' %}" class="navbar-link">Login</a>
      {% endif %}
    </div>

  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script>
    document.body.addEventListener('htmx:afterSettle', function() {
      lucide.createIcons();
    });

    lucide.createIcons();
  </script>
</body>
</html>
